name: E2E Smoke Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-smoke:
    name: Resolution server E2E (mocked)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/ci.txt

      - name: Run E2E smoke test + analysis
        # Exercises every domain (incl. the imported code + math sets) through
        # routing -> resolution -> validation -> cost -> metrics, then runs the
        # analysis report over the populated DB.
        run: python scripts/e2e_smoke.py --per-domain 500 --analyze
